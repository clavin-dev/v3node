name: Release Darwin ARM64

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - name: Download dependencies
        run: go mod download

      - name: Set version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build darwin arm64 binary
        run: |
          mkdir -p build_assets
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 GOEXPERIMENT=jsonv2 \
            go build -v -o build_assets/v2node \
            -trimpath \
            -ldflags "-X 'github.com/wyx2685/v2node/cmd.version=${VERSION}' -s -w -buildid="

      - name: Package artifact
        run: |
          cp README.md build_assets/README.md
          cp LICENSE build_assets/LICENSE
          cd build_assets
          zip -9 "v2node-darwin-arm64-${VERSION}.zip" v2node README.md LICENSE

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: build_assets/v2node-darwin-arm64-${{ env.VERSION }}.zip
