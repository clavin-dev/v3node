name: Release Linux

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            asset_suffix: 64
          - goarch: arm64
            asset_suffix: arm64-v8a
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - name: Download dependencies
        run: go mod download

      - name: Build linux binary
        run: |
          mkdir -p build_assets
          GOOS=linux GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 GOEXPERIMENT=jsonv2 \
            go build -v -o build_assets/v3node \
            -trimpath \
            -ldflags "-X 'github.com/clavin-dev/v3node/cmd.version=${GITHUB_REF_NAME}' -s -w -buildid="

      - name: Download geo data
        run: |
          curl -fL "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geoip.dat" -o build_assets/geoip.dat
          curl -fL "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geosite.dat" -o build_assets/geosite.dat

      - name: Package linux artifact
        run: |
          cp README.md build_assets/README.md
          cp LICENSE build_assets/LICENSE
          cd build_assets
          zip -9 "v3node-linux-${{ matrix.asset_suffix }}.zip" v3node README.md LICENSE geoip.dat geosite.dat

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: build_assets/v3node-linux-${{ matrix.asset_suffix }}.zip
          overwrite_files: true
